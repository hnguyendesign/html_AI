<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | HKN Media</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="animate nav-animate">
        <a href="index.html" class="logo">HKN Media</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="design.html">Design</a></li>
            <li><a href="contact.html" style="opacity: 1;">Contact</a></li>
        </ul>
    </nav>

    <div class="page-container">
        <div class="content-wrapper animate title-animate" style="text-align: center; margin-bottom: 80px;">
            <h1 class="page-title">Contact</h1>
            <p class="subtitle">Let's create something timeless</p>
        </div>

        <div class="contact-flex animate grid-animate">
            <div class="about-col">
                <img src="../me1.jpg" alt="me1" title="me1" class="portrait-img"/>                
                <h2 style="font-family: 'Playfair Display', serif; font-size: 28px;">About Me</h2>
                <div class="title-accent" style="margin: 20px 0; margin-left: 0; width: 40px;"></div>
                <p style="color: #ccc; font-size: 14px; line-height: 2;">Visual storyteller based in California, dedicated to clean aesthetics, striking compositions, and building bold visual identities.</p>
            </div>

            <div class="form-col">
                <form id="contact-form">
                    <input type="text" placeholder="NAME" required>
                    <input type="email" placeholder="EMAIL" required>
                    <input type="text" placeholder="SUBJECT">
                    <textarea placeholder="MESSAGE" rows="5" required></textarea>
                    <button type="submit" class="btn">Send inquiry</button>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
