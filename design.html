<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design | HKN Media</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="design-page">
    <nav class="animate nav-animate">
        <a href="index.html" class="logo">HKN Media</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="design.html" style="opacity: 1;">Design</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="page-container">
        <div class="content-wrapper animate title-animate" style="text-align: center; margin-bottom: 120px;">
            <h1 class="page-title">Graphic Design</h1>
            <p class="subtitle">Visual Identity & Curation</p>
        </div>

        <div class="animate grid-animate" style="width: 100%;">
            
            <div class="agency-section">
                <h2 class="agency-heading">Album Covers</h2>
                <div class="grid-3-col">
                    <div class="img-wrapper square"><img src="../CD.jpg" alt="Album 1"></div>
                    <div class="img-wrapper square"><img src="../CD2.jpg" alt="Album 2"></div>
                    <div class="img-wrapper square"><img src="../CD3.jpg" alt="Album 3"></div>
                </div>
            </div>

            <div class="agency-section">
                <h2 class="agency-heading">Digital Landscapes</h2>
                <div class="grid-2-asym">
                    <div class="img-wrapper wide"><img src="../landscape.jpg" alt="Landscape Wide"></div>
                    <div class="img-wrapper portrait"><img src="../mountain.jpg" alt="Landscape Portrait"></div>
                </div>
            </div>

            <div class="agency-section" style="margin-bottom: 0;">
                <h2 class="agency-heading">Logos & Marks</h2>
                <div class="grid-3-col">
                    <div class="img-wrapper square contain"><img src="../logo1.jpg" alt="Logo 1"></div>
                    <div class="img-wrapper square contain"><img src="../logo2.jpg" alt="Logo 2"></div>
                    <div class="img-wrapper square contain"><img src="../logo3.jpg" alt="Logo 3"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
